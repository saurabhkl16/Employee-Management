<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- =======================  css ========================= -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="home-page.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />
    <link rel="icon" type="image/png" href="../assets/employee.png" />
    <title>Home Page</title>
  </head>

  <body>
    <div class="home-page d-flex">
      <aside>
        <div
          class="sidebar-top-section d-flex flex-column justify-content-center align-items-center"
        >
          <img src="../assets/employee.png" alt="sidebar-logo" height="50px" />
          <h4>EMPLOYEE MANAGER</h4>
        </div>
        <hr />
        <div class="sidebar-links">
          <ul class="mt-5">
            <li>
              <a href="" class="d-flex ms-5"
                ><span class="material-symbols-outlined me-3"> home </span>
                <h5>Home</h5>
              </a>
            </li>
            <li>
              <a href="" class="d-flex ms-5"
                ><span class="material-symbols-outlined me-3">
                  diversity_3
                </span>
                <h5>Attendance</h5>
              </a>
            </li>
            <li>
              <a href="" class="d-flex ms-5"
                ><span class="material-symbols-outlined me-3">
                  accessibility
                </span>
                <h5>Discipline</h5>
              </a>
            </li>
            <li>
              <a href="" class="d-flex ms-5"
                ><span class="material-symbols-outlined me-3">
                  manage_accounts
                </span>
                <h5>Administration</h5>
              </a>
            </li>
            <li>
              <a href="" class="d-flex ms-5"
                ><span class="material-symbols-outlined me-3">
                  currency_rupee_circle
                </span>
                <h5>Payroll</h5>
              </a>
            </li>
            <li>
              <a href="" class="d-flex ms-5"
                ><span class="material-symbols-outlined me-3">
                  assignment
                </span>
                <h5>Report</h5>
              </a>
            </li>
          </ul>
        </div>
        <hr />
        <div class="bottom">
          <ul class="mt-5">
            <li>
              <a href="" class="d-flex ms-5"
                ><span class="material-symbols-outlined me-3"> logout </span>
                <h5>Logout</h5>
              </a>
            </li>
          </ul>
        </div>
      </aside>
      <div class="right-content">
        <div class="navbar">
          <ul class="d-flex justify-content-between w-100">
            <li class="ms-3">
              <a href="" class=""
                ><span class="material-symbols-outlined me-3"> menu </span>
              </a>
            </li>
            <li class="me-3">
              <a href="" class=""
                ><span class="material-symbols-outlined me-3">
                  account_circle
                </span>
              </a>
            </li>
          </ul>
        </div>
        <div class="main-content mx-3">
          <div class="search-box mt-3 p-3">
            <h5>Employee Search</h5>
            <div class="d-flex mt-3">
              <div>
                <!-- <label for="EmployeeId"></label> -->
                <input
                  type="text"
                  id="EmployeeId"
                  placeholder="Enter employee id"
                />
              </div>
              <div>
                <!-- <label for="EmployeeName"></label> -->
                <input
                  type="text"
                  id="EmployeeName"
                  placeholder="Enter employee id"
                />
              </div>
            </div>
          </div>
          <div class="employee-table mt-3">
            <table class="table">
              <thead class="table-primary">
                <tr>
                  <th scope="col">ID</th>
                  <th scope="col">Email</th>
                  <th scope="col">Name</th>
                  <th scope="col">Position</th>
                  <th scope="col">Actions</th>
                </tr>
              </thead>
              <tbody id="employeeTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
    <script src="home-page.js"></script>
  </body>
</html>
