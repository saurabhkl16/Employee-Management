<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- =======================  css ========================= -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="copy.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />
    <link rel="icon" type="image/png" href="../assets/employee.png" />
    <title>Copy Employee</title>
  </head>

  <body>
    <div class="copy-page d-flex">
      <div class="main-div w-100">
        <div class="navbar">
          <ul class="d-flex justify-content-between w-100">
            <li class="ms-3">
              <a href="" class=""
                ><span class="material-symbols-outlined me-3"> menu </span>
              </a>
            </li>
            <li class="me-3">
              <a href="" class=""
                ><span class="material-symbols-outlined me-3">
                  account_circle
                </span>
              </a>
            </li>
          </ul>
        </div>
        <class class="main-content d-flex mt-3">
          <aside>
            <div
              class="sidebar-top-section d-flex flex-column justify-content-center align-items-center"
            >
              <img
                src="../../assets/employee.png"
                alt="sidebar-logo"
                height="50px"
              />
              <!-- <h4>EMPLOYEE MANAGER</h4> -->
            </div>
            <hr />
            <div class="sidebar-links">
              <ul class="mt-5">
                <li>
                  <a href="../home-page.html" class="d-flex ms-5"
                    ><span class="material-symbols-outlined me-3"> home </span>
                    <h5>Home</h5>
                  </a>
                </li>
                <li>
                  <a href="" class="d-flex ms-5"
                    ><span class="material-symbols-outlined me-3">
                      diversity_3
                    </span>
                    <h5>Attendance</h5>
                  </a>
                </li>
                <li>
                  <a href="" class="d-flex ms-5"
                    ><span class="material-symbols-outlined me-3">
                      accessibility
                    </span>
                    <h5>Discipline</h5>
                  </a>
                </li>
                <li>
                  <a href="" class="d-flex ms-5"
                    ><span class="material-symbols-outlined me-3">
                      manage_accounts
                    </span>
                    <h5>Administration</h5>
                  </a>
                </li>
                <li>
                  <a href="" class="d-flex ms-5"
                    ><span class="material-symbols-outlined me-3">
                      currency_rupee_circle
                    </span>
                    <h5>Payroll</h5>
                  </a>
                </li>
                <li>
                  <a href="" class="d-flex ms-5"
                    ><span class="material-symbols-outlined me-3">
                      assignment
                    </span>
                    <h5>Report</h5>
                  </a>
                </li>
              </ul>
            </div>
            <hr />
            <div class="bottom">
              <ul class="mt-3">
                <li>
                  <a href="" class="d-flex ms-5"
                    ><span class="material-symbols-outlined me-3">
                      logout
                    </span>
                    <h5>Logout</h5>
                  </a>
                </li>
              </ul>
            </div>
          </aside>
          <div class="right-content mx-3 p-3">
            <h4>Create Employee</h4>
            <hr />
            <form id="copyForm" class="copy-form mt-4">
              <div class="copy-employee">
                <div class="d-flex flex-column m-3">
                  <label for="name">Name</label>
                  <input
                    type="text"
                    id="name"
                    placeholder="Enter your name"
                    required
                  />
                </div>
                <div class="d-flex flex-column m-3">
                  <label for="surname">Surname</label>
                  <input
                    type="text"
                    id="surname"
                    placeholder="Enter your surname"
                    required
                  />
                </div>
                <div class="d-flex flex-column m-3">
                  <label for="employeeId">Employee Id</label>
                  <input
                    type="text"
                    id="employeeId"
                    placeholder="Enter employee id"
                    required
                  />
                </div>
                <div class="d-flex flex-column m-3">
                  <label for="employeePosition">Employee Position</label>
                  <input
                    type="text"
                    id="employeePosition"
                    placeholder="Enter position"
                    required
                  />
                </div>
                <div class="d-flex flex-column m-3">
                  <label for="employeeEmail">Email ID</label>
                  <input
                    type="email"
                    id="employeeEmail"
                    placeholder="Enter your emial"
                    required
                  />
                </div>
                <div class="d-flex flex-column m-3">
                  <label for="employeeMobile">Mobile Number</label>
                  <input
                    type="text"
                    id="employeeMobile"
                    placeholder="Enter your number"
                    required
                  />
                </div>
              </div>
              <div class="d-flex justify-content-end mt-5">
                <button type="submit" class="btn btn-primary">Submit</button>
              </div>
            </form>
          </div>
        </class>
      </div>
    </div>
    <script src="copy.js"></script>
  </body>
</html>
